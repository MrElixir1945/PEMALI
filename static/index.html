<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMALI - The Thoughtful Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F7F2;
            color: #1D1D1D;
        }
        
        .text-secondary { color: #706F6C; }
        
        /* Custom Scrollbar for right panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D6D3CD; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #A8A29E; }

        /* Typewriter effect wrapper */
        .typewriter-content {
            display: inline;
        }

        /* Thk Badges */
        .badge-palemahan { background-color: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
        .badge-pawongan { background-color: #E3F2FD; color: #1565C0; border: 1px solid #90CAF9; }
        .badge-parahyangan { background-color: #FFF3E0; color: #E65100; border: 1px solid #FFCC80; }

        /* Smooth fade in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex">

    <!-- Left Panel: Context -->
    <div class="w-1/3 h-full bg-stone-50/50 backdrop-blur-md border-r border-stone-200 flex flex-col z-10">
        <div class="p-8">
            <h1 class="text-2xl font-semibold mb-1">PEMALI</h1>
            <p class="text-sm text-secondary mb-8">AI Agentic Geo Auditor</p>
            
            <div class="mb-8">
                <h2 class="text-xs font-semibold uppercase text-stone-400 tracking-wider mb-4">System Status</h2>
                <div id="status-container" class="space-y-3">
                    <!-- Status will be injected here -->
                    <div class="flex items-center text-sm"><span class="w-2 h-2 rounded-full bg-stone-300 mr-3 animate-pulse"></span> Connecting...</div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xs font-semibold uppercase text-stone-400 tracking-wider mb-4">Active Modules</h2>
                <div id="modules-container" class="flex flex-wrap gap-2">
                    <!-- Modules injected here -->
                    <span class="bg-stone-100 text-stone-600 px-3 py-1 rounded-full text-xs font-medium">Loading...</span>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-semibold uppercase text-stone-400 tracking-wider mb-4">Task Queue</h2>
                <div id="queue-container" class="space-y-2">
                    <!-- Tasks injected here -->
                    <div class="text-sm text-stone-500 italic">No tasks.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Panel: Interaction -->
    <div class="w-2/3 h-full flex flex-col relative bg-[#F9F7F2]">
        
        <!-- Header -->
        <div class="h-16 flex items-center justify-between px-8 bg-gradient-to-b from-[#F9F7F2] to-transparent z-10 absolute top-0 w-full pointer-events-none">
            <div id="session-id-display" class="text-xs font-medium text-stone-400 bg-white/80 px-3 py-1 rounded-full border border-stone-200 shadow-sm pointer-events-auto opacity-0 transition-opacity">
                <!-- Session ID -->
            </div>
        </div>

        <!-- Chat / Log Area -->
        <div id="log-container" class="flex-1 overflow-y-auto px-12 pt-24 pb-32 flex flex-col space-y-6 scroll-smooth">
            <!-- Empty State -->
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-md mx-auto animate-fade-in">
                <div class="w-16 h-16 bg-stone-200 rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                    <svg class="w-8 h-8 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-lg font-medium mb-2">Ready to audit.</h3>
                <p class="text-secondary text-sm">Apa yang ingin Anda audit hari ini di wilayah Bali? Ketik instruksi Anda di bawah.</p>
                <div class="mt-8 flex flex-wrap gap-2 justify-center">
                    <button onclick="document.getElementById('chat-input').value='Lakukan audit komprehensif di Ubud sekarang'; document.getElementById('chat-input').focus();" class="bg-white border border-stone-200 text-stone-600 px-4 py-2 rounded-full text-xs font-medium hover:bg-stone-50 transition-colors">"Audit Ubud sekarang"</button>
                    <button onclick="document.getElementById('chat-input').value='Periksa status lahan di Gianyar'; document.getElementById('chat-input').focus();" class="bg-white border border-stone-200 text-stone-600 px-4 py-2 rounded-full text-xs font-medium hover:bg-stone-50 transition-colors">"Periksa Gianyar"</button>
                </div>
            </div>
            <!-- Dynamic Content -->
        </div>

        <!-- Input Bar -->
        <div class="absolute bottom-8 w-full flex justify-center px-8 z-20">
            <div class="relative w-full max-w-2xl">
                <input type="text" id="chat-input" placeholder="Instruksikan agen AI..." 
                    class="w-full bg-white rounded-3xl border border-stone-200 shadow-sm focus:shadow-md transition-shadow duration-300 py-4 pl-6 pr-14 text-sm outline-none text-[#1D1D1D] placeholder:text-stone-400"
                    onkeypress="handleKeyPress(event)">
                <button onclick="sendPrompt()" id="send-btn" class="absolute right-2 top-2 p-2 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-full transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        let currentSessionId = null;
        let renderedMessageIds = new Set();
        let isTyping = false;

        // Fetch Left Panel Data
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                // Render Status
                document.getElementById('status-container').innerHTML = `
                    <div class="flex items-center text-sm">
                        <span class="w-2 h-2 rounded-full ${data.fastapi_active ? 'bg-green-500' : 'bg-red-500'} mr-3 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></span> 
                        Main Node: ${data.fastapi_active ? 'Online' : 'Offline'}
                    </div>
                    <div class="flex items-center text-sm">
                        <span class="w-2 h-2 rounded-full ${data.worker_active ? 'bg-green-500' : 'bg-yellow-500'} mr-3 shadow-[0_0_8px_rgba(234,179,8,0.4)]"></span> 
                        Worker: ${data.worker_active ? 'Active' : 'Idle'}
                    </div>
                `;

                // Render Modules
                if(data.modules && data.modules.length > 0) {
                    const modsHtml = data.modules.map(m => `<span class="bg-white border border-stone-200 text-stone-600 px-3 py-1 rounded-full text-xs font-medium shadow-sm">${m.name}</span>`).join('');
                    document.getElementById('modules-container').innerHTML = modsHtml;
                }

                // Render Queue
                if(data.tasks && data.tasks.length > 0) {
                    const tasksHtml = data.tasks.map(t => `
                        <div class="flex justify-between items-center text-sm py-1 border-b border-stone-200/50 last:border-0">
                            <span class="text-stone-600 truncate max-w-[200px]">${t.intent}</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-${t.status === 'completed' ? 'green' : 'yellow'}-100 text-${t.status === 'completed' ? 'green' : 'yellow'}-700 font-medium">${t.status}</span>
                        </div>
                    `).join('');
                    document.getElementById('queue-container').innerHTML = tasksHtml;
                } else {
                    document.getElementById('queue-container').innerHTML = `<div class="text-sm text-stone-500 italic">No scheduled tasks.</div>`;
                }

            } catch(e) {
                console.error("Failed fetching status", e);
            }
        }

        // Fetch Right Panel Data
        async function fetchSession() {
            try {
                const res = await fetch('/api/session');
                const data = await res.json();
                
                if(!data.session_id) return;
                
                const emptyState = document.getElementById('empty-state');
                if(emptyState) emptyState.style.display = 'none';

                if(currentSessionId !== data.session_id) {
                    // New session detected, clear UI but keep it smooth
                    currentSessionId = data.session_id;
                    renderedMessageIds.clear();
                    const sidDisplay = document.getElementById('session-id-display');
                    sidDisplay.innerText = `Session: ${currentSessionId}`;
                    sidDisplay.classList.remove('opacity-0');
                    document.getElementById('log-container').innerHTML = ''; // Full clear if desired, or let it flow
                }

                const logContainer = document.getElementById('log-container');
                let newItemsAdded = false;

                // Render Memories
                for(let mem of data.memories) {
                    if(renderedMessageIds.has(mem.id)) continue;
                    if(mem.role === 'system') { renderedMessageIds.add(mem.id); continue; }

                    renderedMessageIds.add(mem.id);
                    newItemsAdded = true;

                    const div = document.createElement('div');
                    div.className = 'animate-fade-in w-full max-w-2xl mx-auto';

                    if(mem.role === 'user') {
                        div.innerHTML = `
                            <div class="flex justify-end mb-4">
                                <div class="bg-stone-200 text-[#1D1D1D] px-5 py-3 rounded-2xl rounded-tr-sm text-sm max-w-[80%]">
                                    ${mem.content}
                                </div>
                            </div>
                        `;
                    } else if(mem.role === 'tool') {
                        let hint = "Proses selesai.";
                        try { const p = JSON.parse(mem.content); hint = p.agent_hint || hint; } catch(e){}
                        div.innerHTML = `
                            <div class="mb-4 ml-6 pl-4 border-l-2 border-stone-200">
                                <div class="flex items-center gap-2 mb-1">
                                    <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    <span class="text-xs font-semibold text-stone-500 uppercase tracking-wider">${mem.name}</span>
                                </div>
                                <div class="text-sm text-stone-600 bg-white border border-stone-100 p-4 rounded-xl shadow-sm">
                                    ${hint}
                                </div>
                            </div>
                        `;
                    } else if(mem.role === 'assistant' && mem.content) {
                        // Typewriter logic for assistant reasoning bubble
                        const wrapperId = 'bubble-' + mem.id;
                        div.innerHTML = `
                            <div class="flex justify-start mb-6">
                                <div class="bg-white border border-stone-200 shadow-sm p-6 rounded-3xl rounded-tl-sm text-sm w-full leading-relaxed">
                                    <span id="${wrapperId}" class="typewriter-content"></span>
                                </div>
                            </div>
                        `;
                        logContainer.appendChild(div);
                        typewriterEffect(document.getElementById(wrapperId), mem.content);
                        continue; // skip default append
                    }
                    
                    if(div.innerHTML.trim() !== '') {
                        logContainer.appendChild(div);
                    }
                }

                // Render Final Audit Card if tool chain is done and we have audit
                // We assume audit is final if assistant says final words or report_writer was called recently
                if(data.audit_log && newItemsAdded) {
                    // Check if we haven't rendered this specific log card yet
                    const auditCardId = 'audit-card-' + data.audit_log.id;
                    if(!document.getElementById(auditCardId)) {
                        const adiv = document.createElement('div');
                        adiv.id = auditCardId;
                        adiv.className = 'animate-fade-in w-full max-w-2xl mx-auto mt-8 mb-8';
                        
                        let thkClass = "bg-stone-100 text-stone-600";
                        let thkIcon = "📌";
                        if(data.audit_log.thk.includes("Palemahan")) { thkClass = "badge-palemahan"; thkIcon = "🌱"; }
                        else if(data.audit_log.thk.includes("Pawongan")) { thkClass = "badge-pawongan"; thkIcon = "👥"; }
                        else if(data.audit_log.thk.includes("Parahyangan")) { thkClass = "badge-parahyangan"; thkIcon = "🙏"; }

                        let imageHtml = '';
                        if(data.satellite_img) {
                            imageHtml = `<div class="mb-4 rounded-xl overflow-hidden shadow-sm border border-stone-100"><img src="${data.satellite_img}" alt="Satellite View" class="w-full h-48 object-cover hover:scale-105 transition-transform duration-700"></div>`;
                        }

                        adiv.innerHTML = `
                            <div class="bg-white shadow-sm hover:shadow-md transition-shadow duration-300 rounded-3xl p-6 border border-stone-200">
                                <div class="flex justify-between items-start mb-6">
                                    <div>
                                        <h3 class="text-lg font-semibold text-[#1D1D1D]">Laporan Eksekutif</h3>
                                        <p class="text-sm text-stone-500">Lokasi: <span class="font-medium text-stone-700">${data.audit_log.location}</span></p>
                                    </div>
                                    <div class="flex flex-col gap-2 items-end">
                                        <span class="text-[10px] font-mono text-stone-400">ID: ${data.audit_log.id}</span>
                                        <span class="px-3 py-1 rounded-full text-xs font-medium ${thkClass}">${thkIcon} THK: ${data.audit_log.thk}</span>
                                    </div>
                                </div>
                                ${imageHtml}
                                <div class="bg-[#F9F7F2] p-4 rounded-2xl mb-4">
                                    <h4 class="text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Isu Utama</h4>
                                    <p class="text-sm font-medium text-red-600">${data.audit_log.issue}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs font-semibold text-stone-500 uppercase tracking-wider mb-2">Narasi Audit</h4>
                                    <p class="text-sm text-stone-700 leading-relaxed">${data.audit_log.narrative.replace(/\n/g, '<br>')}</p>
                                </div>
                            </div>
                        `;
                        logContainer.appendChild(adiv);
                    }
                }

                if(newItemsAdded) scrollToBottom();

            } catch(e) {
                console.error("Failed fetching session", e);
            }
        }

        // Typewriter logic
        function typewriterEffect(element, text, speed = 15) {
            let i = 0;
            element.innerHTML = '';
            
            function typeWriter() {
                if (i < text.length) {
                    // Check for markdown boldness basic rendering
                    let char = text.charAt(i);
                    element.innerHTML += char === '\\n' ? '<br>' : char;
                    i++;
                    setTimeout(typeWriter, speed);
                    // auto scroll only if user is at bottom
                    scrollToBottom(false);
                } else {
                    // Quick parse for bold markdown
                    element.innerHTML = element.innerHTML.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    element.innerHTML = element.innerHTML.replace(/\n/g, '<br>');
                }
            }
            typeWriter();
        }

        function scrollToBottom(force=true) {
            const container = document.getElementById('log-container');
            if(force || container.scrollHeight - container.scrollTop < container.clientHeight + 100) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // Send Input
        async function sendPrompt() {
            const input = document.getElementById('chat-input');
            const prompt = input.value.trim();
            if(!prompt) return;

            input.value = '';
            
            // Add user bubble speculatively to feel fast
            const emptyState = document.getElementById('empty-state');
            if(emptyState) emptyState.style.display = 'none';
            const logContainer = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = 'animate-fade-in w-full max-w-2xl mx-auto';
            div.innerHTML = `
                <div class="flex justify-end mb-4">
                    <div class="bg-stone-200 text-[#1D1D1D] px-5 py-3 rounded-2xl rounded-tr-sm text-sm max-w-[80%]">
                        ${prompt}
                    </div>
                </div>
            `;
            logContainer.appendChild(div);
            scrollToBottom();

            // Setup loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'animate-fade-in w-full max-w-2xl mx-auto';
            loadingDiv.innerHTML = `
                <div class="flex justify-start mb-6">
                    <div class="bg-white border border-stone-200 shadow-sm px-6 py-4 rounded-3xl rounded-tl-sm flex items-center space-x-2">
                        <div class="w-2 h-2 bg-stone-300 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                        <div class="w-2 h-2 bg-stone-300 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-stone-300 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            logContainer.appendChild(loadingDiv);

            try {
                const res = await fetch('/api/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                if(!res.ok) throw new Error("Failed to trigger agent");
            } catch(e) {
                alert("Error: Cannot connect to Agent.");
            } finally {
                const loader = document.getElementById('loading-indicator');
                if(loader) loader.remove();
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendPrompt();
            }
        }

        // Initialize polling
        setInterval(fetchStatus, 2000);
        setInterval(fetchSession, 2000);
        
        // Initial fetch
        fetchStatus();
        fetchSession();
    </script>
</body>
</html>
